<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ciudad Profesional - Versión Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --street-color: #1e293b;
            --grass-color: #f1f5f9;
        }

        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .city-container {
            max-width: 1100px;
            width: 95%;
            margin: 20px auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: #334155;
            width: 100%;
            aspect-ratio: 12 / 10;
            position: relative;
            border: 4px solid #475569;
            border-radius: 12px;
            overflow: hidden;
        }

        .cell {
            background-color: #f1f5f9;
            position: relative;
        }

        .street { 
            background-color: var(--street-color) !important; 
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .street-label {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            pointer-events: none;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .building {
            border-radius: 8px;
            margin: 4px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            cursor: pointer;
            z-index: 20;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background-color: white;
        }
        
        .building:hover { 
            transform: scale(1.02); 
            z-index: 30;
        }

        .building img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .building-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            padding: 6px 2px;
            text-align: center;
            font-size: 0.55rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .car {
            position: absolute;
            width: 6%;
            height: 8%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="city-container">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter">CITY SIM FINAL</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest italic">Navegación de Precisión y Tiempo Uniforme</p>
            </div>
            
            <div class="flex gap-3 bg-slate-900/50 p-3 rounded-2xl border border-slate-700">
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-1">Origen</label>
                    <select id="startNode" class="bg-slate-800 text-white text-xs p-2 rounded-lg border-none outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-1">Destino</label>
                    <select id="endNode" class="bg-slate-800 text-white text-xs p-2 rounded-lg border-none outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <button id="moveBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-black px-8 rounded-xl self-end h-9 shadow-lg active:scale-95 transition-all">
                    CONDUCIR
                </button>
            </div>
        </div>

        <div class="relative">
            <div id="city" class="city-grid"></div>
            <div id="car" class="car">🚗</div>
        </div>
    </div>

    <script>
        const SJ_ST = 2.5; 
        const MN_ST = 9.5; 
        const SC_AV = 2.5; 
        const CS_AV = 7.5; 

        const buildings = [
            { id: 'texaco', name: "Texaco Gas Station", row: 0, col: 0, img: "https://www.shutterstock.com/shutterstock/photos/2654871969/display_1500/stock-vector-vector-illustration-of-a-vintage-gas-station-with-red-pumps-and-an-american-flag-clean-lines-and-2654871969.jpg", entry: {r: 1, c: SJ_ST} },
            { id: 'ovalles', name: "Ovalles Hospital", row: 0, col: 3, img: "https://www.shutterstock.com/shutterstock/photos/2642964197/display_1500/stock-vector-hospital-building-isolated-on-white-background-vector-isometric-illustration-building-icon-2642964197.jpg", entry: {r: SC_AV, c: 4} },
            { id: 'stadium', name: "Sarante Stadium", row: 0, col: 5, img: "https://www.shutterstock.com/shutterstock/photos/2591526019/display_1500/stock-vector-stadium-icon-element-for-design-2591526019.jpg", entry: {r: SC_AV, c: 6} },
            { id: 'post', name: "DR Post Office", row: 0, col: 7, img: "https://www.shutterstock.com/shutterstock/photos/1910378884/display_1500/stock-vector-post-office-building-facade-icon-vector-illustration-design-1910378884.jpg", entry: {r: SC_AV, c: 8} },
            { id: 'karla', name: "Karla's Books", row: 0, col: 10, img: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=400", entry: {r: SC_AV, c: 11} },
            { id: 'victor', name: "Victor's Parking", row: 3, col: 0, img: "https://images.unsplash.com/photo-1506521781263-d8422e82f27a?q=80&w=400", entry: {r: 4, c: SJ_ST} },
            { id: 'sarante', name: "Sarante's Dept.", row: 3, col: 3, img: "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=600", entry: {r: SC_AV, c: 4} },
            { id: 'bank', name: "City Bank", row: 3, col: 5, img: "https://www.shutterstock.com/shutterstock/photos/2486511089/display_1500/stock-vector-bank-building-front-view-illustration-design-2486511089.jpg", entry: {r: SC_AV, c: 6} },
            { id: 'mana', name: "La Joya Rest.", row: 3, col: 7, img: "https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=600", entry: {r: SC_AV, c: 8} },
            { id: 'davis', name: "Davis Drug.", row: 3, col: 10, img: "https://images.unsplash.com/photo-1586015555751-63bb77f4322a?q=80&w=400", entry: {r: 4, c: MN_ST} },
            { id: 'garden', name: "Boticanos Garden", row: 5, col: 0, img: "https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?q=80&w=400", entry: {r: 6, c: SJ_ST} },
            { id: 'police', name: "Police Station", row: 5, col: 3, img: "https://images.unsplash.com/photo-1572248524411-fb998da61c47?q=80&w=400", entry: {r: CS_AV, c: 4} },
            { id: 'fire', name: "Fire Station", row: 5, col: 5, img: "https://images.pexels.com/photos/3780658/pexels-photo-3780658.jpeg", entry: {r: CS_AV, c: 6} },
            { id: 'hotel', name: "Cana Hotel", row: 5, col: 7, img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=400", entry: {r: CS_AV, c: 8} },
            { id: 'zoo', name: "Sarante's Zoo", row: 5, col: 10, img: "https://images.unsplash.com/photo-1534567153574-2b12153a87f0?q=80&w=400", entry: {r: 6, c: MN_ST} },
            { id: 'dario', name: "Escuela Dario", row: 8, col: 0, img: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?q=80&w=400", entry: {r: CS_AV, c: 1} },
            { id: 'agora', name: "Agora Mall", row: 8, col: 3, img: "https://www.shutterstock.com/shutterstock/photos/1715831008/display_1500/stock-vector-a-vector-illustration-of-people-outside-shopping-mall-1715831008.jpg", entry: {r: CS_AV, c: 4} },
            { id: 'palacio', name: "Palacio Movie", row: 8, col: 5, img: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400", entry: {r: CS_AV, c: 6} },
            { id: 'pedro', name: "Pedro Super", row: 8, col: 7, img: "https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=400", entry: {r: CS_AV, c: 8} },
            { id: 'steven', name: "Steven's Coffee", row: 8, col: 10, img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=400", entry: {r: 9, c: MN_ST} }
        ];

        const cityContainer = document.getElementById('city');
        const startSelect = document.getElementById('startNode');
        const endSelect = document.getElementById('endNode');
        const carElement = document.getElementById('car');
        const moveBtn = document.getElementById('moveBtn');

        let isMoving = false;

        function initMap() {
            cityContainer.innerHTML = '';
            const occupied = new Set();
            buildings.forEach(b => {
                const cell = document.createElement('div');
                cell.className = 'building';
                cell.style.gridColumn = `${b.col + 1} / span 2`;
                cell.style.gridRow = `${b.row + 1} / span 2`;
                for(let r=0; r<2; r++) for(let c=0; c<2; c++) occupied.add(`${b.row+r}-${b.col+c}`);
                cell.innerHTML = `<img src="${b.img}" alt="${b.name}"><div class="building-overlay">${b.name}</div>`;
                cell.onclick = () => { if(!isMoving) endSelect.value = b.id; };
                cityContainer.appendChild(cell);
            });
            [2, 7].forEach(r => {
                const street = document.createElement('div');
                street.className = 'street';
                street.style.gridColumn = `1 / -1`;
                street.style.gridRow = `${r + 1}`;
                street.innerHTML = `<span class="street-label">${r === 2 ? 'Second Avenue' : 'Castillo Avenue'}</span>`;
                cityContainer.appendChild(street);
                for(let c=0; c<12; c++) occupied.add(`${r}-${c}`);
            });
            [2, 9].forEach(c => {
                const street = document.createElement('div');
                street.className = 'street';
                street.style.gridColumn = `${c + 1}`;
                street.style.gridRow = `1 / -1`;
                street.innerHTML = `<span class="street-label" style="writing-mode: vertical-rl; transform: rotate(180deg)">${c === 2 ? 'San Juan Street' : 'Main Street'}</span>`;
                cityContainer.appendChild(street);
                for(let r=0; r<10; r++) occupied.add(`${r}-${c}`);
            });
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 12; c++) {
                    if (!occupied.has(`${r}-${c}`)) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.style.gridColumn = `${c + 1}`;
                        cell.style.gridRow = `${r + 1}`;
                        cityContainer.appendChild(cell);
                    }
                }
            }
            if(startSelect.options.length === 0) {
                buildings.sort((a,b) => a.name.localeCompare(b.name)).forEach(b => {
                    startSelect.add(new Option(b.name, b.id));
                    endSelect.add(new Option(b.name, b.id));
                });
                startSelect.value = 'texaco';
                endSelect.value = 'bank';
            }
            updateCarPosition(buildings.find(b => b.id === startSelect.value));
        }

        function getCenter(b) { return { r: b.row + 1, c: b.col + 1 }; }

        function updateCarPosition(b) {
            const cellW = cityContainer.offsetWidth / 12;
            const cellH = cityContainer.offsetHeight / 10;
            const center = getCenter(b);
            carElement.style.left = `${center.c * cellW - (carElement.offsetWidth/2)}px`;
            carElement.style.top = `${center.r * cellH - (carElement.offsetHeight/2)}px`;
        }

        async function drive() {
            if (isMoving) return;
            const start = buildings.find(b => b.id === startSelect.value);
            const end = buildings.find(b => b.id === endSelect.value);
            if (start === end) return;
            
            isMoving = true;
            moveBtn.disabled = true;

            const cellW = cityContainer.offsetWidth / 12;
            const cellH = cityContainer.offsetHeight / 10;
            const path = [];
            const addNode = (r, c) => path.push({y: r * cellH, x: c * cellW});

            const sCenter = getCenter(start);
            const eCenter = getCenter(end);
            const sEntry = start.entry;
            const eEntry = end.entry;

            addNode(sCenter.r, sCenter.c);
            addNode(sEntry.r, sEntry.c);

            const hAves = [SC_AV, CS_AV];
            const vStreets = [SJ_ST, MN_ST];

            const sameRoad = (sEntry.r === eEntry.r && hAves.includes(sEntry.r)) || 
                             (sEntry.c === eEntry.c && vStreets.includes(sEntry.c));

            if (sameRoad) {
                addNode(eEntry.r, eEntry.c);
            } else {
                const sOnH = hAves.includes(sEntry.r);
                const eOnH = hAves.includes(eEntry.r);

                if (sOnH !== eOnH) {
                    const interRow = sOnH ? sEntry.r : eEntry.r;
                    const interCol = sOnH ? eEntry.c : sEntry.c;
                    addNode(interRow, interCol);
                } else {
                    let minD = Infinity;
                    let bestIntersects = [];
                    if (!sOnH) {
                        hAves.forEach(row => {
                            const d = Math.abs(sEntry.r - row) + Math.abs(eEntry.r - row);
                            if (d < minD) { minD = d; bestIntersects = [{r: row, c: sEntry.c}, {r: row, c: eEntry.c}]; }
                        });
                    } else {
                        vStreets.forEach(col => {
                            const d = Math.abs(sEntry.c - col) + Math.abs(eEntry.c - col);
                            if (d < minD) { minD = d; bestIntersects = [{r: sEntry.r, c: col}, {r: eEntry.r, c: col}]; }
                        });
                    }
                    bestIntersects.forEach(node => addNode(node.r, node.c));
                }
                addNode(eEntry.r, eEntry.c);
            }
            addNode(eCenter.r, eCenter.c);

            let totalDistance = 0;
            for (let i = 1; i < path.length; i++) {
                const d = Math.sqrt(Math.pow(path[i].x - path[i-1].x, 2) + Math.pow(path[i].y - path[i-1].y, 2));
                totalDistance += d;
            }

            const CONSTANT_TOTAL_TIME = 10; 

            for (let i = 1; i < path.length; i++) {
                const p = path[i];
                const prev = path[i-1];
                const segDist = Math.sqrt(Math.pow(p.x - prev.x, 2) + Math.pow(p.y - prev.y, 2));
                const duration = (segDist / totalDistance) * CONSTANT_TOTAL_TIME;

                carElement.style.transition = `all ${duration}s linear`;
                carElement.style.left = `${p.x - (carElement.offsetWidth/2)}px`;
                carElement.style.top = `${p.y - (carElement.offsetHeight/2)}px`;
                await new Promise(res => setTimeout(res, duration * 1000));
            }

            startSelect.value = end.id;
            isMoving = false;
            moveBtn.disabled = false;
        }

        moveBtn.onclick = drive;
        window.onload = initMap;
        window.onresize = initMap;
    </script>
</body>
</html>
